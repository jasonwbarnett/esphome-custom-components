name: CI

on:
  push:
    paths:
      - "components/vl53l1x/**"
      - "tests/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "components/vl53l1x/**"
      - "tests/**"
      - ".github/workflows/ci.yml"
  workflow_dispatch:

jobs:
  config:
    name: esphome config
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        file:
          - tests/test-sensor.yaml
          - tests/test-binary-sensor.yaml
          - tests/test-short-mode.yaml
          - tests/test-pololu-continuous.yaml
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install esphome
      - run: esphome config ${{ matrix.file }}

  compile:
    name: esphome compile
    runs-on: ubuntu-latest
    needs: config
    strategy:
      fail-fast: false
      matrix:
        file:
          - tests/test-sensor.yaml
          - tests/test-binary-sensor.yaml
          - tests/test-short-mode.yaml
          - tests/test-pololu-continuous.yaml
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Cache PlatformIO and pip
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('tests/**') }}
          restore-keys: |
            pio-${{ runner.os }}-
      - run: pip install esphome
      - run: esphome compile ${{ matrix.file }}
